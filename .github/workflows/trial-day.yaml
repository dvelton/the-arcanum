name: Trial Day
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  trial-day:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trial Day
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/trial_day.py

      - name: Commit results
        run: |
          git config user.name "The Arcanum"
          git config user.email "arcanum@github.com"
          git add apprentices/*/star-chart.json apprentices/*/journal/
          git commit -m "Trial Day: $(date -u +%Y-%m-%d) results" || true
          git push
