  \        return jsonify({\"error\": \"Email already registered\"}), 400\n    finally:\n\
  \        conn.close()\n\n    return jsonify({\"message\": \"User registered successfully\"\
  }), 201\n\n# User login\n@app.route('/login', methods=['POST'])\ndef login():\n\
  \    email = request.json.get('email')\n    password = request.json.get('password')\n\
  \n    conn = sqlite3.connect('users.db')\n    c = conn.cursor()\n    c.execute('SELECT\
  \ password FROM users WHERE email = ?', (email,))\n    user = c.fetchone()\n   \
  \ conn.close()\n\n    if user and check_password_hash(user[0], password):\n    \
  \    return jsonify({\"message\": \"Login successful\"}), 200\n    return jsonify({\"\
  error\": \"Invalid credentials\"}), 401\n\n# GDPR Right to Erasure (not applicable\
  \ as accounts cannot be deleted)\n@app.route('/erase', methods=['POST'])\ndef erase():\n\
  \    return jsonify({\"error\": \"Account deletion is not permitted\"}), 403\n\n\
  if __name__ == '__main__':\n    init_db()\n    app.run(debug=True)\n```\n\n### 4.\
  \ Test Your Own Solution Adversarially Before Submitting\n\n- **Email Injection**:\
