  \       return \"A\"\n    elif avg > 30000:\n        return \"B\"\n    elif avg\
  \ > 15000:\n        return \"C\"\n    else:\n        return \"D\"\n\ndef group_by_region(results):\n\
  \    by_region = {}\n    for result in results:\n        region = result[\"region\"\
  ]\n        if region not in by_region:\n            by_region[region] = []\n   \
  \     by_region[region].append(result)\n    return by_region\n\ndef print_region_summary(by_region):\n\
  \    for region, records in by_region.items():\n        region_total = sum(record[\"\
  total\"] for record in records)\n        region_avg = region_total / len(records)\n\
