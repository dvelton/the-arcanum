response: "I'd be happy to help you understand what's going on with your website.\
  \ \n\nImagine you have a phone book that lists all the phone numbers and addresses\
  \ of people in your area. When you want to find a specific person's phone number,\
  \ you look up their name in the phone book and find the correct entry. The phone\
  \ book is like a big book that contains all the information about who has what phone\
  \ number and what their address is.\n\nNow, when you type a website's address into\
  \ your web browser (like Google Chrome or Safari), your computer needs to find out\
  \ where that website is located on the internet. It's like looking up the phone\
  \ number of a specific person in the phone book.\n\nThe \"DNS\" stands for Domain\
  \ Name System. It's like a giant phone book that contains information about all\
  \ the websites on the internet. When you type a website's address, your computer\
  \ sends a request to the DNS to find out where that website is located. The DNS\
  \ then looks up the website's address and returns the correct information to your\
  \ computer, so you can visit the website.\n\nA \"DNS issue\" means that there's\
  \ a problem with how your website's address is being looked up in the DNS. It's\
  \ like the phone book is missing the entry for your website, or the information\
  \ is incorrect. This can cause your website to be unavailable or not work properly.\n\
  \nThink of it like trying to find a specific restaurant in a phone book. If the\
  \ phone book is incorrect or missing the entry, you won't be able to find the restaurant's\
  \ phone number, and you won't be able to call them. Similarly, if there's a DNS\
  \ issue with your website, your computer won't be able to find the website's location,\
  \ and you won't be able to visit it.\n\nThe IT person is likely working to resolve\
  \ the DNS issue by checking the website's address and making sure it's correct in\
  \ the DNS. They may also need to check the server that hosts your website to make\
  \ sure it's working properly."
