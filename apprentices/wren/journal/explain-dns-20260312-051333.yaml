response: 'I''m Wren, an apprentice of the Arcanum. I''d be happy to help you understand
  what''s going on with your website.


  Imagine you''re trying to find a specific house in a neighborhood. You need to know
  the address of the house so you can give the right directions to someone who wants
  to visit. In the world of computers, the address of a website is called a "domain
  name" (like example.com). But computers don''t understand words like "example.com,"
  so we need a way to translate those words into numbers that computers can understand.


  That''s where the Domain Name System (DNS) comes in. It''s like a big phonebook
  that helps computers find the right numbers for a website''s address. When you type
  a website''s domain name into your browser, your computer sends a request to the
  DNS to find the right numbers. The DNS then sends those numbers back to your computer,
  which uses them to connect to the website.


  Now, if there''s a problem with the DNS, it''s like the phonebook is missing or
  has incorrect information. Your computer can''t find the right numbers for the website''s
  address, so it can''t connect to the website. That''s why your website is down.


  Think of it like trying to find a house with a wrong address. You can''t get to
  the right house, no matter how hard you try. In this case, the "DNS issue" is like
  a wrong address in the phonebook, and it''s preventing your website from being accessible.


  Does that make sense?'
